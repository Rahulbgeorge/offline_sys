[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx_out.log
stderr_logfile=/var/log/nginx_err.log

[program:gunicorn]
directory=/root/server/app
command=/bin/bash -c "source /root/server/venv/bin/activate && if [ -d /root/server/app/dummy-fastapi-server ]; then cd /root/server/app/dummy-fastapi-server; fi && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker -b 127.0.0.1:8000"
autostart=true
autorestart=true
stdout_logfile=/var/log/gunicorn_out.log
stderr_logfile=/var/log/gunicorn_err.log

[program:cloudflared]
command=/usr/local/bin/cloudflared tunnel run --token %(ENV_CLOUDFLARED_TOKEN_NAME)s
autostart=true
autorestart=true
startretries=10
stdout_logfile=/var/log/cloudflared_out.log
stderr_logfile=/var/log/cloudflared_err.log

[program:caddy]
command=/usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
autostart=true
autorestart=true
stdout_logfile=/var/log/caddy_out.log
stderr_logfile=/var/log/caddy_err.log

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/var/log/sshd_out.log
stderr_logfile=/var/log/sshd_err.log
